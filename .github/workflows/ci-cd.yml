# .github/workflows/ci-cd.yml
name: CI/CD Pipeline

on:
  pull_request:
    branches: [main, "cycle-*", "cooldown-*"]

  push:
    branches: [main, "cycle-*", "cooldown-*"]

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "development"
        type: choice
        options:
          - development
          - production

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun modules
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint

      - name: Run tests
        run: bun test

  security-scan:
    name: Security & Quality
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun modules
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Security audit
        run: bun run audit

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6

      - name: Test Docker Build
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "Testing production Docker build..."
            docker build -t test-build .
          else
            echo "Testing development Docker build..."
            docker build -f Dockerfile.dev -t test-build-dev .
          fi

  deploy-development:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [lint-and-test, security-scan, docker-build]
    if: |
      github.event_name == 'push' &&
      (startsWith(github.ref_name, 'cycle-') || startsWith(github.ref_name, 'cooldown-')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'development')
    concurrency:
      group: deploy-dev
      cancel-in-progress: true
    environment: development
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Set deployment metadata
        run: |
          echo "BRANCH_NAME=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "DEPLOYMENT_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_ENV"
          echo "COMMIT_SHA=${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"
          echo "APP_VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"

      - name: Deploy to development
        run: |
          flyctl deploy --config fly.dev.toml --remote-only \
            --env BRANCH_NAME=${{ env.BRANCH_NAME }} \
            --env DEPLOYMENT_TIME=${{ env.DEPLOYMENT_TIME }} \
            --env COMMIT_SHA=${{ env.COMMIT_SHA }} \
            --env APP_VERSION=${{ env.APP_VERSION }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_DEPLOY_TOKEN }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint-and-test, security-scan, docker-build]
    if: |
      github.ref_name == 'main' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    concurrency:
      group: deploy-production
      cancel-in-progress: true
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Set APP_VERSION
        run: |
          echo "APP_VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"

      - name: Deploy to production
        run: |
          flyctl deploy --config fly.prod.toml --remote-only \
            --env APP_VERSION=${{ env.APP_VERSION }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_DEPLOY_TOKEN }}

  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_name == 'main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: |
          curl -sLO https://github.com/orhun/git-cliff/releases/download/v2.6.0/git-cliff-2.6.0-x86_64-unknown-linux-gnu.tar.gz
          curl -sLO https://github.com/orhun/git-cliff/releases/download/v2.6.0/git-cliff-2.6.0-x86_64-unknown-linux-gnu.tar.gz.sha512
          echo "$(cat git-cliff-2.6.0-x86_64-unknown-linux-gnu.tar.gz.sha512 | cut -d' ' -f1)  git-cliff-2.6.0-x86_64-unknown-linux-gnu.tar.gz" | sha512sum -c -
          sudo tar -xzf git-cliff-2.6.0-x86_64-unknown-linux-gnu.tar.gz --strip-components=1 -C /usr/local/bin
          rm -f git-cliff-2.6.0-x86_64-unknown-linux-gnu.tar.gz git-cliff-2.6.0-x86_64-unknown-linux-gnu.tar.gz.sha512
          || cargo install git-cliff@2.6.0

      - name: Generate changelog
        run: git-cliff --config .cligrc --output CHANGELOG.md

      - name: Commit and push changelog
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs: update changelog for v${VERSION} [skip changelog]"
          git rev-parse --verify --quiet refs/tags/v${VERSION} || git tag v${VERSION}
          git push origin main
          git push origin v${VERSION}

  notify-pr-deployments:
    name: Notify PR of Deployment
    runs-on: ubuntu-latest
    needs: [deploy-development, deploy-production]
    if: needs.deploy-development.result == 'success' || needs.deploy-production.result == 'success'
    steps:
      - uses: actions/checkout@v6

      - name: Get app version
        run: echo "APP_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Comment on PR after successful deployment
        uses: actions/github-script@v8
        with:
          script: |
            const branchName = context.ref.replace('refs/heads/', '');

            const { data: allOpen } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            const prs = allOpen.filter(pr => pr.head.ref === branchName);

            if (prs.length === 0) {
              console.log('No open PRs found for this branch');
              return;
            }

            const pr = prs[0];

            const prodOK = ${{ needs.deploy-production.result == 'success' }};
            const devOK  = ${{ needs.deploy-development.result == 'success' }};

            let deploymentUrl, environment;
            if (prodOK) {
              deploymentUrl = 'https://tourrankings.fly.dev';
              environment   = 'production';
            } else if (devOK) {
              deploymentUrl = 'https://tourrankings-dev.fly.dev';
              environment   = 'development';
            }

            const version = process.env.APP_VERSION || 'unknown';
            const comment = `**Deployment Successful**
            Your branch \`${branchName}\` has been deployed to ${environment}:
            - **URL**: ${deploymentUrl}
            - **Environment**: ${environment}
            - **Version**: ${version}
            - **Commit**: ${context.sha.substring(0, 7)}
            - **Deployed**: ${new Date().toISOString()}

            Your changes are now live and ready for testing.
            `.trim();

            const existing = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100
            });

            const prev = existing.data.find(c => c.body?.includes('**Deployment Successful**'));
            if (prev) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: prev.id, body: comment });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number, body: comment });
            }
            console.log(`Commented on PR #${pr.number}: ${pr.title}`);
        env:
          APP_VERSION: ${{ env.APP_VERSION }}

  shape-up-automation:
    name: Shape Up Workflow
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_name == 'main'
    steps:
      - name: Archive completed cycle
        uses: actions/github-script@v8
        with:
          script: |
            console.log('Cycle completed and deployed to production');

      - name: Cycle completion notification
        run: |
          echo "Shape Up cycle completed!"
          echo "Changes are now live in production"
          echo "Ready for next cycle planning"

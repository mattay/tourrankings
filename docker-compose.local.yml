# docker-compose.local.yml - Local development with hot reload
#
# Usage:
#   Start:              docker compose -f docker-compose.local.yml up
#   Start with cron:    docker compose -f docker-compose.local.yml --profile cron up
#   Run scraper once:   docker compose -f docker-compose.local.yml exec app bun scrape
#   Stop:               docker compose -f docker-compose.local.yml down
#
# Purpose: Daily development work with instant code changes via volume mounts

services:
  app:
    env_file:
      - .env.local
    build:
      context: .
      dockerfile: Dockerfile.local
    ports:
      - "8080:8080"
    volumes:
      # Source code - changes reflect immediately
      - ./src:/tourRanking/src
      - ./server:/tourRanking/server
      - ./public:/tourRanking/public
      - ./scripts:/tourRanking/scripts
      - ./data:/tourRanking/data
      # Config files
      - ./crontab:/tourRanking/crontab
      - ./jsconfig.json:/tourRanking/jsconfig.json:ro
      - ./tourrankings-google-service-account-key.json:/tourRanking/tourrankings-google-service-account-key.json:ro
      # Preserve container's node_modules
      - /tourRanking/node_modules
    environment:
      # These override/supplement .env.local
      NODE_ENV: development
      PORT: 8080
      DATA_DIR: /tourRanking/data/csv
      LOG_LEVEL: debug
      PUPPETEER_HEADLESS: "true"
      # Set Chrome path for container (overrides Mac path from .env.local)
      PUPPETEER_EXECUTABLE_PATH: /tourRanking/chrome-headless-shell/linux-142/chrome-headless-shell-linux64/chrome-headless-shell
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:8080/health').then(r=>r.ok||process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Run cron scheduler alongside app
  # Activate with: docker compose -f docker-compose.local.yml --profile cron up
  cron:
    env_file:
      - .env.local
    build:
      context: .
      dockerfile: Dockerfile.local
    profiles:
      - cron
    volumes:
      - ./src:/tourRanking/src
      - ./server:/tourRanking/server
      - ./data:/tourRanking/data
      # Config files
      - ./crontab:/tourRanking/crontab
      - ./tourrankings-google-service-account-key.json:/tourRanking/tourrankings-google-service-account-key.json:ro
      # Preserve container's dependencies
      - /tourRanking/node_modules
    environment:
      NODE_ENV: development
      DATA_DIR: /tourRanking/data/csv
      LOG_LEVEL: debug
      PUPPETEER_HEADLESS: "true"
      # Set Chrome path for container
      PUPPETEER_EXECUTABLE_PATH: /tourRanking/chrome-headless-shell/linux-142/chrome-headless-shell-linux64/chrome-headless-shell
    command: ["supercronic", "-passthrough-logs", "/tourRanking/crontab"]
    depends_on:
      - app

# docker-compose.local.yml - Local development with hot reload
#
# Usage:
#   Start:              docker compose -f docker-compose.local.yml up
#   Start with cron:    docker compose -f docker-compose.local.yml --profile cron up
#   Run scraper once:   docker compose -f docker-compose.local.yml exec app bun scrape
#   Stop:               docker compose -f docker-compose.local.yml down
#
# Purpose: Daily development work with instant code changes via volume mounts

services:
  app:
    env_file:
      - .env.local
    build:
      context: .
      dockerfile: Dockerfile.local
    ports:
      - "8080:8080"
    volumes:
      # Source code - changes reflect immediately
      - ./src:/tourRanking/src
      - ./public:/tourRanking/public
      - ./scripts:/tourRanking/scripts
      # Shared CSV/HTML data from the bare repo root; logs stay per-worktree
      - ../.local/data/csv:/tourRanking/data/csv
      - ../.local/data/html:/tourRanking/data/html
      - ./data/logs:/tourRanking/data/logs
      # Config files
      - ./crontab:/tourRanking/crontab
      - ./jsconfig.json:/tourRanking/jsconfig.json:ro
      - ../.local/#SECRET_google-service-account-key.json:/tourRanking/#SECRET_google-service-account-key.json:ro
      # Preserve container's node_modules
      - /tourRanking/node_modules
    environment:
      # These override/supplement .env.local
      NODE_ENV: development
      PORT: 8080
      DATA_DIR: /tourRanking/data/csv
      LOG_LEVEL: debug
      LOG_DIR: /tourRanking/data/logs
      FILE_LOGGING_ENABLED: "true"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:8080/health').then(r=>r.ok||process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Watches client source files and rebuilds public/js and public/css on change.
  # This service shares the public/ volume so the app serves updated assets.
  build-watch:
    env_file:
      - .env.local
    build:
      context: .
      dockerfile: Dockerfile.local
    volumes:
      # Source code - changes reflect immediately
      - ./src:/tourRanking/src
      - ./public:/tourRanking/public
      - ./scripts:/tourRanking/scripts
      # Config files
      - ./jsconfig.json:/tourRanking/jsconfig.json:ro
      # Preserve container's node_modules
      - /tourRanking/node_modules
    environment:
      NODE_ENV: development
    command: ["bun", "run", "build:watch"]

  # Optional: Run cron scheduler alongside app
  # Activate with: docker compose -f docker-compose.local.yml --profile cron up
  cron:
    env_file:
      - .env.local
    build:
      context: .
      dockerfile: Dockerfile.local
    profiles:
      - cron
    volumes:
      - ./src:/tourRanking/src
      - ./server:/tourRanking/src/server
      # Shared CSV/HTML data from the bare repo root; logs stay per-worktree
      - ../.local/data/csv:/tourRanking/data/csv
      - ../.local/data/html:/tourRanking/data/html
      - ./data/logs:/tourRanking/data/logs
      # Config files
      - ./crontab:/tourRanking/crontab
      - ../.local/#SECRET_google-service-account-key.json:/tourRanking/#SECRET_google-service-account-key.json:ro
      # Preserve container's dependencies
      - /tourRanking/node_modules
    environment:
      NODE_ENV: development
      DATA_DIR: /tourRanking/data/csv
      LOG_LEVEL: debug
      LOG_DIR: /tourRanking/data/logs
      FILE_LOGGING_ENABLED: "true"
    command: ["supercronic", "-passthrough-logs", "/tourRanking/crontab"]
    depends_on:
      - app

# fly.dev.toml - Development environment on Fly.io
# Deploy: fly deploy --config fly.dev.toml
# Purpose: Cloud-based testing environment with production-like infrastructure

app = 'tourrankings-dev'
primary_region = 'syd'

[build]
dockerfile = "Dockerfile"  # Uses production Dockerfile
ignorefile = ".dockerignore"

[[vm]]
memory = '768mb'
cpu_kind = 'shared'
cpus = 1

[env]
NODE_ENV = "development"
NODE_OPTIONS = "--max-old-space-size=512"
LOG_LEVEL = "debug"
DATA_AUTO_REFRESH = "true"
DATA_AUTO_REFRESH_INTERVAL = "900000"  # 15 min - faster feedback in dev

[mounts]
source = "dev_data_volume"
destination = "/tourRanking/data"

[processes]
webserver = "sh -c 'supercronic -passthrough-logs /tourRanking/crontab & exec bun start'"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = 'suspend'
auto_start_machines = true
min_machines_running = 0
max_machines_running = 1
processes = ["webserver"]

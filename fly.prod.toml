# fly.prod.toml - Production environment
# Deploy: fly deploy --config fly.prod.toml
# Purpose: Live production application

app = 'tourrankings'
primary_region = 'syd'

[build]
dockerfile = "Dockerfile"
ignorefile = ".dockerignore"

[[vm]]
memory = '512mb'
cpu_kind = 'shared'
cpus = 1

[env]
NODE_ENV = "production"
LOG_LEVEL = "info"
DATA_AUTO_REFRESH = "true"
DATA_AUTO_REFRESH_INTERVAL = "1800000"  # 30 min
APP_VERSION = ""  # Injected by CI/CD during deployment
CORS_ORIGIN = "https://tour-rankings.com"
SESSION_TRACKING_ENABLED = "true"

# File logging
LOG_DIR = "/tourRanking/data/logs"
FILE_LOGGING_ENABLED = "true"
LOG_ACCESS_ROTATION_DAYS = "90"
LOG_ACCESS_ROTATION_SIZE_MB = "50"
LOG_API_ROTATION_DAYS = "90"
LOG_API_ROTATION_SIZE_MB = "50"
LOG_HEALTH_ROTATION_DAYS = "7"
LOG_HEALTH_ROTATION_SIZE_MB = "10"
LOG_STATIC_ROTATION_DAYS = "30"
LOG_STATIC_ROTATION_SIZE_MB = "50"

[mounts]
source = "data_volume"
destination = "/tourRanking/data"

[processes]
webserver = "sh -c 'supercronic -passthrough-logs /tourRanking/crontab & exec bun start'"

[http_service]
processes = ["webserver"]
internal_port = 8080
force_https = true
auto_stop_machines = 'off'     # cron must always run — don't suspend
auto_start_machines = true
min_machines_running = 1
max_machines_running = 1

[[http_service.checks]]
  grace_period = "15s"   # time after start before checks begin
  interval = "30s"
  method = "GET"
  path = "/health"
  port = 8080
  timeout = "5s"
